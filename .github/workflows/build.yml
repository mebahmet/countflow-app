name: Build Android & iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK + AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter create . --platforms android --org com.countflow --project-name countflow
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - run: flutter gen-l10n
      - run: flutter test
      - run: flutter build apk --debug --target-platform android-arm64
      - run: flutter build apk --release --target-platform android-arm64
      - run: flutter build appbundle --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter create . --platforms ios --org com.countflow --project-name countflow
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - run: flutter gen-l10n
      - run: flutter build ios --release --no-codesign
      - name: Create IPA
        run: |
          mkdir -p build/ios/ipa
          cd build/ios/Release-iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r ../ipa/CountFlow-unsigned.ipa Payload/
      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned
          path: build/ios/ipa/CountFlow-unsigned.ipa
          retention-days: 30
