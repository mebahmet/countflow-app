name: Build Android & iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK + AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true
      - name: Generate Android platform files
        run: flutter create . --platforms android --org com.countflow --project-name countflow
      - name: Fix Kotlin stdlib conflict (share_plus requires 1.9.0)
        run: |
          cat >> android/app/build.gradle << 'GRADLE'

          configurations.all {
              resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                  if (details.requested.group == 'org.jetbrains.kotlin') {
                      details.useVersion '1.9.0'
                      details.because 'Align Kotlin stdlib version for share_plus'
                  }
              }
          }
          GRADLE
      - run: flutter pub get
      - name: Generate Hive adapters
        run: flutter pub run build_runner build --delete-conflicting-outputs
      - name: Generate localizations
        run: flutter gen-l10n
      - run: flutter test
      - run: flutter build apk --debug --target-platform android-arm64
      - run: flutter build apk --release --target-platform android-arm64
      - run: flutter build appbundle --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  build-ios:
    name: Build iOS (simulator)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true
      - name: Generate iOS platform files
        run: flutter create . --platforms ios --org com.countflow --project-name countflow
      - run: flutter pub get
      - name: Generate Hive adapters
        run: flutter pub run build_runner build --delete-conflicting-outputs
      - name: Generate localizations
        run: flutter gen-l10n
      - run: flutter build ios --simulator
      - uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: build/ios/iphonesimulator/Runner.app
          retention-days: 30
