name: countflow
description: SAY / CountFlow — Smart tally counter with history, goals & dhikr mode
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Local storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # UI
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.19.0
  share_plus: ^9.0.0
  csv: ^6.0.0
  haptic_feedback: ^0.5.1+1
  home_widget: ^0.4.1
  flutter_local_notifications: ^17.2.2
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#1A0E3D"
  adaptive_icon_foreground: "assets/icons/app_icon_fg.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/

  fonts:
    - family: AppFont
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
